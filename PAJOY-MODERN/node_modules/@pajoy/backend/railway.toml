[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
PORT = "5179"

[[services]]
name = "pajoy-backend"

[services.ports]
port = 5179
type = "HTTP"

[services.health_checks]
path = "/health"
timeout = 100
interval = 30
grace_period = 10

[services.env]
NODE_ENV = "production"
PORT = "5179"
